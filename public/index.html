<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css"
</head>
<body>
    
    <h1 style="font-size: 10vw;">Pocket Aces Lobbies</h1>
    <div class="lobbymain">
   
    </div>
    <table class="customization" style="margin-left: 4vw;">
      <tr>
        <th>
                 <label class="defaulttext">
  Input Your Username
        </label>

        </th>
        <th style="padding-left: 5vw;">
    <label class="defaulttext">Choose your color</label>
        </th>
        <th>
            <tr>
                <th>
    <input type="text" id="nameInput" placeholder="Input Name">
                </th>
                <th>
                    <button class="colorselection" style="background-color: red;"></button>
                    <button class="colorselection" style="background-color: blue;"></button>
                    <button class="colorselection" style="background-color:yellow;"></button>
                    <button class="colorselection" style="background-color:purple;"></button>
                    <button class="colorselection" style="background-color:greenyellow;"></button>
                </th>
            </tr>

        </th>
      </tr>
      
        <tr>
            <th>
<br><label class="defaulttext">Choose your Font</label><br>
            </th>
</tr>  

            <th>
<select name ="Preferred Font" id="PlayerFont" style="width: 32vw;" dropzone="20px">
    <option value="Default">Default</option>
    <option value="Molot"> Molot </option>
</select>
            </th>

<tr>
   
</tr>
    </table>
    <table style="background-color: rgb(252, 255, 53); border-style:solid; border-radius: 2vw; border-color: black; border-width: 0.5vw; width: 80%; align-self: center;">
        <tr style="border-style: solid; border-width: 1vw; border-color: black;">
    <th class="padding">
        <label class="customization">Username</label>
    </th>
     <th class="padding">
        <label class="customization">Font</label>
    </th>
     <th class="padding">
        <label class="customization">Color</label>
    </th>
</tr>
<tr>
    <th>
        <label class="customization" id="Yourusername">Kamas</label>
    </th>
    <th>
        <label class="customization" id="Yourfont">Default</label>

    </th>
    <th>
        <label class="customization" id="Yourcolor">Color</label>

    </th>
    </tr>
    </table>
    
<div class="lobbymain">  
<br>
    <button onclick="createLobby()"">Create Lobby</button>
   
    <button onclick="joinLobby()"">Join Lobby</button>


    <input type="text" id="lobbyName" placeholder="Input Name of Lobby" style="display: none;">
    <input type="text" id="lobbyPass" placeholder="Input Pass of Lobby" style="display: none;">
    
    <button id="finalCreate" onclick="finalCreate()" style="display: none;">Create</button>
    <button id="finalJoin" onclick="finalJoin()" style="display: none;">Join</button>
    
</div>
    <script src="client.js"></script>
</body>
</html>
